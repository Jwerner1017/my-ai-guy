# AETHER Configuration — Sovereign Local Intelligence
# This file controls every major system. Edit with care.

system:
  name: "Aether"
  version: "0.1.0-genesis"
  log_level: "INFO"                    # DEBUG | INFO | WARNING | ERROR
  data_dir: "./data"                   # Where memory, logs, and user data live
  enable_self_improvement: true
  max_concurrent_tools: 3

llm:
  provider: "ollama"                   # ollama | openai | anthropic (future)
  model: "llama3.1:8b"                 # or qwen2.5:14b, mistral-nemo, etc.
  temperature: 0.7
  max_tokens: 4096
  streaming: true
  # For cloud providers (only if you explicitly enable):
  # api_key_env: "OPENAI_API_KEY"

memory:
  vector_store: "chromadb"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  collection_name: "aether_episodic"
  importance_threshold: 0.6            # Memories below this decay faster
  max_retrieved_memories: 12
  enable_knowledge_graph: true
  reflection_interval_hours: 24        # How often the agent reflects on its own performance

agent:
  max_planning_depth: 6
  enable_reflection: true
  enable_self_critique: true
  human_in_the_loop_default: true      # Powerful actions require approval by default
  interruptible: true                  # User can interrupt graph execution anytime

voice:
  enabled: true
  stt_model: "large-v3"                # faster-whisper model size
  tts_voice: "en_US-lessac-medium"     # Piper voice (download separately)
  sample_rate: 22050
  enable_barge_in: true
  vad_aggressiveness: 2                # 0-3, higher = more aggressive voice detection

tools:
  browser_enabled: true
  code_execution_enabled: true
  code_execution_timeout_seconds: 30
  file_access_allowed_paths: ["./data", "./user_files"]  # Whitelist only
  web_search_enabled: false            # Disabled by default for sovereignty

ui:
  theme: "dark"
  show_token_usage: true
  show_full_graph_trace: true
  enable_memory_editor: true
  port: 7860

security:
  require_approval_for: ["browser", "code_execution", "file_write"]
  max_daily_token_budget: 500000       # Soft limit with warning

